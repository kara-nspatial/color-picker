<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palette — Color Extractor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Palette</h1>
        <p>Drop any image to extract its dominant colors</p>
      </header>

      <main>
        <div id="drop-zone" role="button" tabindex="0" aria-label="Drop image here or click to upload">
          <input type="file" id="file-input" accept="image/*" hidden />
          <div class="drop-zone__content">
            <div class="drop-zone__icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3 21h18M3 3h18M12 3v4.5M10.5 6l1.5-1.5L13.5 6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <p class="drop-zone__label">Drop your image here</p>
            <p class="drop-zone__sub">or <button type="button" id="browse-btn">choose a file</button></p>
            <p class="drop-zone__hint">PNG, JPG, WebP, GIF</p>
          </div>
        </div>

        <section id="result" hidden>
          <div id="preview-wrap">
            <img id="preview" alt="Uploaded image preview" />
            <button id="reset-btn" type="button" aria-label="Upload a new image">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311h2.433a.75.75 0 000-1.5H3.989a.75.75 0 00-.75.75v4.242a.75.75 0 001.5 0v-2.43l.31.31a7 7 0 0011.712-3.138.75.75 0 00-1.449-.39zm1.23-3.723a.75.75 0 00.219-.53V2.929a.75.75 0 00-1.5 0V5.36l-.31-.31A7 7 0 003.239 8.188a.75.75 0 101.448.389A5.5 5.5 0 0113.89 6.11l.311.31h-2.432a.75.75 0 000 1.5h4.243a.75.75 0 00.53-.219z"/>
              </svg>
              New image
            </button>
          </div>

          <div id="palette-wrap">
            <div id="swatches"></div>
            <div class="palette-footer">
              <button id="copy-css" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path d="M7 3.5A1.5 1.5 0 018.5 2h3.879a1.5 1.5 0 011.06.44l3.122 3.12A1.5 1.5 0 0117 6.622V12.5a1.5 1.5 0 01-1.5 1.5h-1v-3.379a3 3 0 00-.879-2.121L10.5 5.379A3 3 0 008.379 4.5H7v-1z"/><path d="M4.5 6A1.5 1.5 0 003 7.5v9A1.5 1.5 0 004.5 18h7a1.5 1.5 0 001.5-1.5v-5.879a1.5 1.5 0 00-.44-1.06L9.44 6.439A1.5 1.5 0 008.378 6H4.5z"/>
                </svg>
                Copy as CSS Variables
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <canvas id="canvas" hidden></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
